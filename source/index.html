<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine - GPU Token Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="model-selector">
                <button class="model-btn" data-model="chatgpt">ChatGPT</button>
                <button class="model-btn active" data-model="gemini">Gemini</button>
                <button class="model-btn" data-model="claude">Claude</button>
            </div>
            <h1>AI Token Casino</h1>
            <div id="jackpot-display" class="jackpot-container">
                <span id="jackpot-ticker">100,000</span>
                <small>GPU CREDITS</small>
            </div>
        </header>

        <main>
            <div class="slot-machine">
                <div class="payline"></div>
                <div class="reels-container">
                    <div class="reel" id="reel-1">
                        <div class="reel-strip"></div>
                    </div>
                    <div class="reel" id="reel-2">
                        <div class="reel-strip"></div>
                    </div>
                    <div class="reel" id="reel-3">
                        <div class="reel-strip"></div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="tokens-display">
                    <div class="balance-info">
                        <span class="balance-label">Compute Balance</span>
                        <div id="token-balance">1,000</div>
                    </div>
                    <button id="add-tokens-btn" title="Refill Compute Credits">+</button>
                </div>
                <div class="bet-controls" id="bet-container">
                    <!-- Dynamic Bet Buttons -->
                </div>
                <div class="action-buttons">
                    <button id="spin-btn">Spin Model</button>
                    <button id="auto-btn">Auto-Bet</button>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <section class="logs-container">
                <h3>Neural Logs</h3>
                <div id="game-logs"></div>
            </section>
            <section class="stats-container">
                <h3>Performance Stats</h3>
                <div id="game-stats">
                    <p>Inferences: <span id="stat-spins">0</span></p>
                    <p>Yield: <span id="stat-won">0</span></p>
                    <p>Missions: <span id="stat-missions">0/3</span></p>
                </div>
                <button id="paytable-btn">Model Architecture (Paytable)</button>
            </section>
        </aside>

        <footer>
            <button id="settings-btn">Environment Settings</button>
        </footer>
    </div>

    <!-- Modals -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Environment Configuration</h2>
            <div class="setting-group">
                <label>Audio Feedback</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button id="close-settings">Apply & Close</button>
        </div>
    </div>

    <div id="paytable-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="paytable-title">Model Payout Structure</h2>
            <div id="paytable-grid" class="paytable-grid">
                <!-- Dynamic Payout List -->
            </div>
            <button id="close-paytable">Return to Terminal</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
