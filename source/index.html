<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine - GPU Token Casino</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>AI Token Casino</h1>
            <div class="jackpot-container">
                <span>LIVE JACKPOT:</span>
                <span id="jackpot-ticker">100,000</span> GPU Credits
            </div>
        </header>

        <main>
            <div class="slot-machine">
                <div class="payline"></div>
                <div class="reels-container">
                    <div class="reel" id="reel-1">
                        <div class="reel-strip"></div>
                    </div>
                    <div class="reel" id="reel-2">
                        <div class="reel-strip"></div>
                    </div>
                    <div class="reel" id="reel-3">
                        <div class="reel-strip"></div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="tokens-display">
                    Tokens: <span id="token-balance">1,000</span>
                    <button id="add-tokens-btn" title="Add 1,000 Tokens">+</button>
                </div>
                <div class="bet-controls">
                    <button class="bet-btn" data-amount="1">1</button>
                    <button class="bet-btn active" data-amount="10">10</button>
                    <button class="bet-btn" data-amount="100">100</button>
                    <button class="bet-btn" id="max-bet">MAX</button>
                </div>
                <div class="action-buttons">
                    <button id="spin-btn">SPIN</button>
                    <button id="auto-btn">AUTO-BET</button>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <section class="logs-container">
                <h3>AI Training Logs</h3>
                <div id="game-logs"></div>
            </section>
            <section class="stats-container">
                <h3>Statistics</h3>
                <div id="game-stats">
                    <p>Spins: <span id="stat-spins">0</span></p>
                    <p>Total Won: <span id="stat-won">0</span></p>
                    <p>Missions: <span id="stat-missions">0/3</span></p>
                </div>
            </section>
        </aside>

        <footer>
            <button id="settings-btn">Settings</button>
        </footer>
    </div>

    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="setting-group">
                <label>Theme</label>
                <select id="theme-select">
                    <option value="dark">Shadow Mode (Dark)</option>
                    <option value="light">Prompt Engineer (Light)</option>
                    <option value="cyber">Neural Network (Cyberpunk)</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Sound</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button id="close-settings">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
