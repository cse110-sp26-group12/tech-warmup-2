<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéSlots - The Ultimate Pokémon Slot Machine</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="theme-kanto">
    <div id="game-container">
        <header>
            <div id="jackpot-container">
                <span class="label">LIVE JACKPOT</span>
                <div id="jackpot-value">₽ 1,000,000</div>
            </div>
        </header>

        <main>
            <div id="reels-container">
                <div class="payline"></div>
                <div class="reel" id="reel-1">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel-2">
                    <div class="reel-strip"></div>
                </div>
                <div class="reel" id="reel-3">
                    <div class="reel-strip"></div>
                </div>
            </div>

            <div id="stop-buttons">
                <button class="stop-btn" data-reel="0" disabled>STOP 1</button>
                <button class="stop-btn" data-reel="1" disabled>STOP 2</button>
                <button class="stop-btn" data-reel="2" disabled>STOP 3</button>
            </div>

            <div id="status-message">Press SPIN to Start!</div>
        </main>

        <section id="controls">
            <div class="control-group">
                <label>BET</label>
                <div class="bet-controls">
                    <button id="bet-minus">-</button>
                    <span id="current-bet">₽ 10</span>
                    <button id="bet-plus">+</button>
                </div>
                <button id="bet-max">MAX</button>
            </div>

            <div class="main-buttons">
                <button id="spin-btn">SPIN</button>
                <button id="autoplay-btn">AUTOPLAY: OFF</button>
            </div>

            <div class="balance-info">
                <label>BALANCE</label>
                <div id="balance-value">₽ 1,000</div>
            </div>
        </section>

        <aside id="stats-panel">
            <h3>LOGS & STATS</h3>
            <div class="stat-item">Spins: <span id="stat-spins">0</span></div>
            <div class="stat-item">Wins: <span id="stat-wins">0</span></div>
            <div class="stat-item">Streak: <span id="stat-streak">0</span></div>
            <div id="event-log"></div>
        </aside>

        <button id="settings-toggle">⚙️</button>
    </div>

    <div id="settings-modal" class="hidden">
        <div class="modal-content">
            <h2>Settings</h2>
            <div class="setting-item">
                <label>Music</label>
                <input type="checkbox" id="music-toggle" checked>
            </div>
            <div class="setting-item">
                <label>Sound Effects</label>
                <input type="checkbox" id="sound-toggle" checked>
            </div>
            <div class="setting-item">
                <label>Volatility</label>
                <select id="volatility-select">
                    <option value="low">Low (Frequent Wins)</option>
                    <option value="high">High (Karen Mode)</option>
                </select>
            </div>
            <div class="setting-item">
                <label>Theme</label>
                <select id="theme-select">
                    <option value="theme-kanto">Kanto (Red/White)</option>
                    <option value="theme-johto">Johto (Gold/Silver)</option>
                    <option value="theme-hoenn">Hoenn (Ruby/Sapphire)</option>
                </select>
            </div>
            <button id="close-settings">Close</button>
        </div>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
