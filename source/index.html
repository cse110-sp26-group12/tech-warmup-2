<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Slot Machine - GPU Token Casino</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --ai-neon-blue: #00f2ff;
            --ai-neon-purple: #bc13fe;
            --dark-space: #0d0d12;
            --reel-gradient: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
        }

        .slot-machine-container {
            background: radial-gradient(circle at center, #1e1e2f 0%, #0a0a0f 100%) !important;
            border: 2px solid var(--ai-neon-purple) !important;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(188, 19, 254, 0.3);
        }

        .slot-machine {
            background: var(--dark-space) !important;
            border: 4px solid var(--ai-neon-blue) !important;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5), inset 0 0 15px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        .reel {
            background: var(--reel-gradient) !important;
            border: 1px solid rgba(0, 242, 255, 0.2) !important;
        }

        .payline {
            border-top: 2px solid var(--ai-neon-blue) !important;
            border-bottom: 2px solid var(--ai-neon-blue) !important;
            background: rgba(0, 242, 255, 0.05) !important;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="main-header">
            <div class="header-left">
                <div class="model-selector">
                    <button class="model-btn" data-model="chatgpt">ChatGPT</button>
                    <button class="model-btn active" data-model="gemini">Gemini</button>
                    <button class="model-btn" data-model="claude">Claude</button>
                </div>
            </div>
            
            <div class="header-center">
                <div id="jackpot-display" class="jackpot-container">
                    <small>PRIORITY JACKPOT</small>
                    <div class="jackpot-wrapper">
                        <span id="jackpot-ticker">100,000</span>
                    </div>
                </div>
            </div>

            <div class="header-right">
                <h1>AI Token Casino</h1>
            </div>
        </header>

        <main>
            <div class="slot-machine-container">
                <div id="win-overlay" class="win-overlay"></div>
                <div class="slot-machine">
                    <div class="payline"></div>
                    <div class="reels-container">
                        <div class="reel" id="reel-1">
                            <div class="reel-strip"></div>
                        </div>
                        <div class="reel" id="reel-2">
                            <div class="reel-strip"></div>
                        </div>
                        <div class="reel" id="reel-3">
                            <div class="reel-strip"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <div class="tokens-display">
                    <div class="balance-info">
                        <span class="balance-label">Compute Balance</span>
                        <div id="token-balance">1,000</div>
                    </div>
                    <button id="add-tokens-btn" class="round-btn" title="Refill Compute Credits">+</button>
                </div>
                <div class="bet-controls" id="bet-container">
                    <!-- Dynamic Bet Buttons -->
                </div>
                <div class="action-buttons">
                    <button id="spin-btn" class="primary-action">Spin Model</button>
                    <button id="auto-btn" class="secondary-action">Auto-Bet</button>
                </div>
            </div>
        </main>

        <aside class="sidebar">
            <div class="sidebar-top">
                <section class="stats-container">
                    <h3>Performance Stats</h3>
                    <div id="game-stats">
                        <p>Inferences: <span id="stat-spins">0</span></p>
                        <p>Yield: <span id="stat-won">0</span></p>
                        <p>Missions: <span id="stat-missions">0/3</span></p>
                    </div>
                    <button id="paytable-btn" class="info-btn">Model Architecture</button>
                </section>
            </div>
            <section class="logs-container">
                <h3>Neural Logs</h3>
                <div id="game-logs" class="game-logs"></div>
            </section>
        </aside>

        <footer>
            <button id="settings-btn" class="minimal-btn">Environment Settings</button>
        </footer>
    </div>

    <!-- Modals -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h2>Environment Configuration</h2>
            <div class="setting-group">
                <label>Audio Feedback</label>
                <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
            </div>
            <button id="close-settings" class="modal-btn">Apply & Close</button>
        </div>
    </div>

    <div id="paytable-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="paytable-title">Model Payout Structure</h2>
            <div id="paytable-grid" class="paytable-grid">
                <!-- Dynamic Payout List -->
            </div>
            <button id="close-paytable" class="modal-btn">Return to Terminal</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
